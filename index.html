<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Editorial Studio | Powered by Pollinations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'], serif: ['Cormorant Garamond', 'serif'] },
                    colors: { cream: '#F9F9F6', ink: '#0A0A0A' }
                }
            }
        }
    </script>
    <style>
        html { scroll-behavior: smooth; }
        body { background-color: #050505; color: #ffffff; overflow-x: hidden; }
        .video-bg { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; width: auto; height: auto; z-index: -2; object-fit: cover; opacity: 0.5; filter: grayscale(30%) contrast(120%); }
        .video-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: linear-gradient(180deg, rgba(5, 5, 5, 0.4) 0%, rgba(5, 5, 5, 0.95) 100%); }
        .luxury-input { background: transparent; border: none; border-bottom: 1px solid rgba(255, 255, 255, 0.2); color: #ffffff; font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; width: 100%; padding: 0.5rem 0; transition: all 0.4s ease; border-radius: 0; }
        .luxury-input:focus { outline: none; border-bottom: 1px solid rgba(255, 255, 255, 1); background: transparent; }
        .luxury-input::placeholder { color: rgba(255, 255, 255, 0.15); }
        .magazine-wrapper { background: #F9F9F6; color: #0A0A0A; }
        .magazine-page { page-break-after: always; padding: 6rem 4rem; max-width: 1200px; margin: 0 auto; min-height: 100vh; }
        .formatted-content { column-count: 2; column-gap: 4rem; text-align: justify; }
        .formatted-content p { font-family: 'Montserrat', sans-serif; font-size: 0.95rem; line-height: 2; margin-bottom: 1.5rem; font-weight: 300; color: #222; }
        .formatted-content>p:first-of-type::first-letter { float: left; font-size: 6.5rem; line-height: 0.7; padding-top: 8px; padding-right: 12px; font-family: 'Cormorant Garamond', serif; font-weight: 400; color: #0A0A0A; }
        .formatted-content h3 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 400; color: #000; margin-top: 2rem; margin-bottom: 1rem; border-bottom: 1px solid #ddd; padding-bottom: 0.5rem; column-span: all; }
        .formatted-content ul, .formatted-content ol { font-family: 'Montserrat', sans-serif; margin-left: 1rem; margin-bottom: 2rem; color: #333; font-size: 0.95rem; line-height: 2; font-weight: 300; }
        .formatted-content li { margin-bottom: 0.5rem; }
        .formatted-content strong { font-weight: 500; color: #000; }
        #workspace-container { display: flex; width: 100%; transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        #book-container { transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        #critique-panel { transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        /* Modals and audio controls smooth animations */
        #costs-panel, #cover-panel, #audio-controls { transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #333; }
        @media print {
            .no-print, .video-bg, .video-overlay, #critique-panel { display: none !important; }
            body, .magazine-wrapper { background: white !important; color: black !important; }
            .magazine-page { padding: 0; max-width: 100%; margin: 0; }
            .formatted-content { column-count: 2; column-gap: 3rem; }
            #book-container { width: 100% !important; }
        }
        .pulse-text { animation: pulseOpacity 2s infinite; }
        @keyframes pulseOpacity { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body class="antialiased min-h-screen relative selection:bg-white selection:text-black">
    <video autoplay loop muted playsinline class="video-bg no-print">
        <source src="https://cdn.coverr.co/videos/coverr-dark-abstract-waves-2641/1080p.mp4" type="video/mp4">
    </video>
    <div class="video-overlay no-print"></div>
