<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI E-Book Studio | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Ultra-Premium Typography: Cormorant (Serif) & Montserrat (Sans) -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans:['Montserrat', 'sans-serif'],
                        serif: ['Cormorant Garamond', 'serif'],
                    },
                    colors: {
                        cream: '#F9F9F6',
                        ink: '#0F0F0F',
                    }
                }
            }
        }
    </script>

    <style>
        /* Base Resets & Smoothness */
        html { scroll-behavior: smooth; }
        body { background-color: #050505; color: #ffffff; overflow-x: hidden; }
        
        /* The $200k Video Background Technique */
        .video-bg {
            position: fixed; right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto; z-index: -2;
            object-fit: cover; opacity: 0.6;
        }
        .video-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background: linear-gradient(180deg, rgba(5,5,5,0.3) 0%, rgba(5,5,5,0.95) 100%);
        }

        /* Swiss Luxury Inputs */
        .luxury-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            color: #ffffff;
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            width: 100%;
            padding: 0.5rem 0;
            transition: all 0.4s ease;
        }
        .luxury-input:focus {
            outline: none;
            border-bottom: 1px solid rgba(255,255,255,1);
        }
        .luxury-input::placeholder { color: rgba(255,255,255,0.15); }

        /* The Output: Print Magazine Styling */
        .magazine-wrapper { background: #F9F9F6; color: #0F0F0F; }
        .magazine-page { page-break-after: always; padding: 6rem 4rem; max-width: 1200px; margin: 0 auto; min-height: 100vh; }
        
        .formatted-content {
            /* This makes the text flow in 2 columns like a real magazine */
            column-count: 2;
            column-gap: 4rem;
            text-align: justify;
        }
        
        .formatted-content p { font-family: 'Montserrat', sans-serif; font-size: 0.95rem; line-height: 2; margin-bottom: 1.5rem; font-weight: 300; color: #222; }
        
        /* Massive Drop Cap for the first paragraph */
        .formatted-content > p:first-of-type::first-letter { 
            float: left; font-size: 6rem; line-height: 0.7; padding-top: 8px; padding-right: 12px; 
            font-family: 'Cormorant Garamond', serif; font-weight: 400; color: #0F0F0F; 
        }
        
        .formatted-content h3 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 400; color: #000; margin-top: 2rem; margin-bottom: 1rem; border-bottom: 1px solid #ddd; padding-bottom: 0.5rem; column-span: all; }
        .formatted-content ul, .formatted-content ol { font-family: 'Montserrat', sans-serif; margin-left: 1rem; margin-bottom: 2rem; color: #333; font-size: 0.95rem; line-height: 2; font-weight: 300;}
        .formatted-content li { margin-bottom: 0.5rem; }
        .formatted-content strong { font-weight: 500; color: #000; }

        /* Custom minimal scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #333; }

        @media print { 
            .no-print, .video-bg, .video-overlay { display: none !important; }
            body, .magazine-wrapper { background: white !important; color: black !important; }
            .magazine-page { padding: 0; max-width: 100%; margin: 0; }
            .formatted-content { column-count: 2; column-gap: 2rem; }
        }
    </style>
</head>
<body class="antialiased min-h-screen relative selection:bg-white selection:text-black">

    <!-- Cinematic Video Background (Abstract Dark Fluid) -->
    <video autoplay loop muted playsinline class="video-bg no-print">
        <!-- High-end abstract stock video from a public CDN -->
        <source src="https://cdn.coverr.co/videos/coverr-dark-abstract-waves-2641/1080p.mp4" type="video/mp4">
    </video>
    <div class="video-overlay no-print"></div>

    <!-- Transparent, Ultra-Minimal Nav -->
    <nav class="w-full flex justify-between items-center p-8 md:px-16 no-print z-50 fixed top-0 left-0 mix-blend-difference">
        <h1 class="text-sm font-sans tracking-[0.3em] uppercase text-white font-light">
            E-Book Studio
        </h1>
        
        <a id="auth-btn" class="text-xs font-sans tracking-[0.2em] uppercase text-white border-b border-white/30 pb-1 hover:border-white transition-all cursor-pointer hidden">
            Authenticate
        </a>
        
        <div id="user-status" class="hidden flex items-center space-x-6">
            <span id="tier-badge" class="text-xs font-sans tracking-[0.2em] uppercase text-white/60">SPORE</span>
            <span class="text-xs font-sans tracking-[0.2em] uppercase text-white">
                Pollen: <span id="pollen-balance" class="font-medium">...</span>
            </span>
        </div>
    </nav>

    <!-- Main Studio Interface -->
    <main class="relative z-10 w-full min-h-screen flex flex-col items-center justify-center px-6 pt-32 pb-20 no-print">
        
        <!-- Auth Warning State -->
        <div id="auth-warning" class="text-center mb-16 hidden">
            <h2 class="text-4xl md:text-6xl font-serif text-white mb-4">Access Restricted</h2>
            <p class="text-sm font-sans tracking-widest uppercase text-white/50 max-w-md mx-auto leading-loose">
                Authentication required. Connect your Pollinations node to utilize the generation engine at zero cost.
            </p>
        </div>

        <!-- The Studio Form (Brutalist Luxury) -->
        <div id="app-wrapper" class="hidden w-full max-w-3xl mx-auto mt-12">
            
            <div id="limits-dashboard" class="mb-16 flex justify-between items-end border-b border-white/10 pb-4">
                <p class="text-xs font-sans tracking-[0.2em] uppercase text-white/50">System Capacity</p>
                <p class="text-sm font-sans tracking-widest text-white"><span id="max-pages-display" class="font-medium text-lg">0</span> PAGES MAX</p>
            </div>

            <div class="space-y-16">
                <!-- Input 1 -->
                <div class="group">
                    <label class="block text-xs font-sans tracking-[0.2em] text-white/50 mb-2 uppercase transition-colors group-focus-within:text-white">01 / Subject Matter</label>
                    <input type="text" id="topic" placeholder="e.g. The Architecture of Sound" class="luxury-input">
                </div>
                
                <!-- Input 2 -->
                <div class="group">
                    <label class="block text-xs font-sans tracking-[0.2em] text-white/50 mb-2 uppercase transition-colors group-focus-within:text-white">02 / Art Direction & Tone</label>
                    <input type="text" id="style" placeholder="e.g. Minimalist, Bauhaus, Melancholic" class="luxury-input">
                </div>
                
                <!-- Input 3 -->
                <div class="group">
                    <label class="block text-xs font-sans tracking-[0.2em] text-white/50 mb-2 uppercase transition-colors group-focus-within:text-white">03 / Page Count</label>
                    <input type="number" id="pages-count" value="4" min="1" class="luxury-input w-32">
                    <p id="page-warning" class="text-xs font-sans tracking-widest text-red-500 mt-4 hidden">EXCEEDS ALLOCATED BALANCE</p>
                </div>
            </div>
            
            <!-- Generate Action -->
            <div class="mt-20 pt-10 text-center">
                <button id="generate-btn" class="text-sm font-sans tracking-[0.3em] uppercase text-white border border-white px-12 py-5 hover:bg-white hover:text-black transition-all duration-500 w-full md:w-auto">
                    Initialize Orchestrator
                </button>
                <p id="status-text" class="text-xs font-sans tracking-[0.2em] uppercase text-white/40 mt-8 h-4"></p>
            </div>
        </div>
    </main>

    <!-- Rendered Magazine Output -->
    <div id="book-container" class="hidden w-full bg-cream z-20 relative">
        <div class="text-center py-12 bg-ink no-print sticky top-0 z-30 border-b border-white/10">
            <button onclick="window.print()" class="text-xs font-sans tracking-[0.2em] uppercase text-white hover:text-white/60 transition-colors">
                [ Export Editorial ]
            </button>
        </div>
        
        <div class="magazine-wrapper" id="book-content">
            <!-- AI Content Injected Here -->
        </div>
    </div>

    <script>
    const authBtn = document.getElementById('auth-btn');
    const authWarning = document.getElementById('auth-warning');
    const appWrapper = document.getElementById('app-wrapper');
    const userStatus = document.getElementById('user-status');
    const limitsDashboard = document.getElementById('limits-dashboard');
    const maxPagesDisplay = document.getElementById('max-pages-display');
    const pagesInput = document.getElementById('pages-count');
    const pageWarning = document.getElementById('page-warning');
    const pollenBalanceEl = document.getElementById('pollen-balance');
    const tierBadgeEl = document.getElementById('tier-badge');
    
    let maxAllowedPages = 0;

    const urlHash = new URLSearchParams(location.hash.slice(1));
    let apiKey = urlHash.get('api_key');

    if(window.location.hash) {
        window.history.replaceState(null, null, location.pathname);
    }

    if (apiKey) {
        authBtn.classList.add('hidden');
        authWarning.classList.add('hidden');
        appWrapper.classList.remove('hidden');
        userStatus.classList.remove('hidden');
        fetchAccountData();
    } else {
        authWarning.classList.remove('hidden');
        if (window.location.protocol === 'about:' || window.location.protocol === 'blob:') {
            authWarning.innerHTML += `
                <p class="text-xs font-sans tracking-widest uppercase text-red-500 mt-8">
                    SYSTEM ERROR: PREVIEW SANDBOX DETECTED.<br>RUN LOCALLY OR DEPLOY TO PROCEED.
                </p>
            `;
        } else {
            authBtn.classList.remove('hidden');
            const params = new URLSearchParams({
                redirect_url: window.location.href.split('#')[0],
                permissions: 'profile,balance'
            });
            authBtn.href = `https://enter.pollinations.ai/authorize?${params}`;
            authBtn.target = "_top";
        }
    }

    async function fetchAccountData() {
        try {
            const balRes = await fetch('https://gen.pollinations.ai/account/balance', {
                headers: { 'Authorization': `Bearer ${apiKey}` }
            });
            const balData = await balRes.json();
            
            const balance = balData.balance !== undefined ? parseFloat(balData.balance) : parseFloat(balData);
            pollenBalanceEl.innerText = isNaN(balance) ? "0.00" : balance.toFixed(2);

            maxAllowedPages = isNaN(balance) ? 0 : Math.floor(balance / 0.001);
            maxPagesDisplay.innerText = maxAllowedPages;
            pagesInput.max = maxAllowedPages;

            const profRes = await fetch('https://gen.pollinations.ai/account/profile', {
                headers: { 'Authorization': `Bearer ${apiKey}` }
            });
            if (profRes.ok) {
                const profData = await profRes.json();
                if(profData.tier) {
                    tierBadgeEl.innerText = profData.tier.toUpperCase();
                }
            }

            pagesInput.addEventListener('input', (e) => {
                if (parseInt(e.target.value) > maxAllowedPages) {
                    pageWarning.classList.remove('hidden');
                    document.getElementById('generate-btn').disabled = true;
                    document.getElementById('generate-btn').style.opacity = '0.3';
                } else {
                    pageWarning.classList.add('hidden');
                    document.getElementById('generate-btn').disabled = false;
                    document.getElementById('generate-btn').style.opacity = '1';
                }
            });
        } catch (err) {
            console.error(err);
        }
    }

    const generateBtn = document.getElementById('generate-btn');
    const statusText = document.getElementById('status-text');
    const bookContainer = document.getElementById('book-container');
    const bookContent = document.getElementById('book-content');

    generateBtn.onclick = async () => {
        const topic = document.getElementById('topic').value;
        const style = document.getElementById('style').value;
        const pagesCount = parseInt(document.getElementById('pages-count').value);

        if(!topic || !style) {
            statusText.innerText = "ERROR: REQUIRED FIELDS MISSING";
            return;
        }

        try {
            generateBtn.disabled = true;
            generateBtn.innerText = "PROCESSING...";
            generateBtn.classList.add('opacity-50', 'pointer-events-none');
            
            bookContainer.classList.add('hidden');
            bookContent.innerHTML = '';

            statusText.innerText = "SYNTHESIZING EDITORIAL BLUEPRINT...";
            
            const prompt = `You are a visionary Editor-in-Chief and Elite AI Prompt Architect.
            Create a highly sophisticated, high-value editorial spread about "${topic}".
            Pages required: ${pagesCount}. Art direction: "${style}".

            RULES FOR CONTENT:
            1. Write like a premium magazine (Vogue, GQ, Monocle). Professional, insightful, profound.
            2. Format the "content" field in HTML:
               - Use <p> for main text.
               - Use <h3> for elegant sub-headers.
               - Use <ul> / <ol> for structured breakdowns.
            
            RULES FOR IMAGE PROMPTS (FLUX AI): 
            1. Create breathtaking, award-winning photography prompts.
            2. End with: "masterpiece, 8k, highly detailed, cinematic lighting, high-end editorial photography".
            3. NO TEXT, NO LETTERS, NO TYPOGRAPHY IN THE IMAGE.

            Reply ONLY in this JSON structure:
            {
                "title": "A profound, elegant title",
                "introduction": "A sophisticated preamble.",
                "pages":[
                    {
                        "page_title": "Chapter Heading",
                        "content": "<p>Content...</p>",
                        "image_prompt": "Subject, environment, lighting, style, masterpiece, 8k"
                    }
                ]
            }`;

            const textRes = await fetch('https://gen.pollinations.ai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: 'openai',
                    messages:[{ role: 'user', content: prompt }],
                    response_format: { type: "json_object" },
                    temperature: 0.4
                })
            });

            if(!textRes.ok) throw new Error("API REJECTION");
            
            const textData = await textRes.json();
            let rawJson = textData.choices[0].message.content.replace(/```json/g, '').replace(/```/g, '').trim();
            const blueprint = JSON.parse(rawJson);

            // THE EDITORIAL COVER
            bookContent.innerHTML += `
                <div class="magazine-page flex flex-col justify-center items-center text-center">
                    <h1 class="text-7xl md:text-9xl font-serif text-ink mb-12 leading-[0.9] tracking-tighter uppercase px-4">${blueprint.title}</h1>
                    <div class="w-24 h-[1px] bg-ink mb-12"></div>
                    <p class="text-lg md:text-2xl font-sans font-light text-gray-600 max-w-2xl mx-auto leading-loose px-8">${blueprint.introduction}</p>
                </div>
            `;
            bookContainer.classList.remove('hidden');

            // THE EDITORIAL PAGES
            for (let i = 0; i < blueprint.pages.length; i++) {
                const page = blueprint.pages[i];
                statusText.innerText = `RENDERING VISUALS: PAGE 0${i + 1} OF 0${blueprint.pages.length}...`;

                // 16:9 Cinematic Aspect Ratio
                const imgRes = await fetch(`https://gen.pollinations.ai/image/${encodeURIComponent(page.image_prompt)}?model=flux&width=1280&height=720`, {
                    headers: { 'Authorization': `Bearer ${apiKey}` }
                });

                if(!imgRes.ok) throw new Error("IMAGE RENDER FAILED");
                const imgUrl = URL.createObjectURL(await imgRes.blob());

                bookContent.innerHTML += `
                    <div class="magazine-page">
                        <div class="mb-16">
                            <p class="text-xs font-sans tracking-[0.3em] uppercase text-gray-400 mb-4 border-b border-gray-200 pb-4">
                                Section 0${i + 1} &mdash; ${blueprint.title}
                            </p>
                            <h2 class="text-5xl md:text-7xl font-serif text-ink mb-12 tracking-tight">${page.page_title}</h2>
                            <img src="${imgUrl}" alt="Editorial" class="w-full h-[60vh] object-cover bg-gray-100 grayscale-[20%] contrast-125">
                        </div>
                        <div class="formatted-content">
                            ${page.content}
                        </div>
                    </div>
                `;
                
                bookContainer.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }

            statusText.innerText = "SEQUENCE COMPLETE. AWAITING EXPORT.";
            generateBtn.innerText = "INITIALIZE NEW SEQUENCE";
            setTimeout(fetchAccountData, 3000); 

        } catch (err) {
            console.error(err);
            statusText.innerText = `SYSTEM ERROR: ${err.message}`;
            generateBtn.innerText = "RETRY INITIALIZATION";
        } finally {
            generateBtn.disabled = false;
            generateBtn.classList.remove('opacity-50', 'pointer-events-none');
        }
    };
    </script>
</body>
</html>
